<!DOCTYPE html>
<html>
  <head>
    <title>Chatbot</title>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">


       function Something({inputText, setInputText}) {
        function SaveInputText(event) {
            setInputText(event.target.value);
        }
        return (
            <> 
                <input type="text" placeholder="Type a name here" onChange={SaveInputText} value={inputText} />
                <button onClick={() => setInputText("")}>Reset</button>
                <button onClick={() => setInputText("Alice")}>Example</button>
                <p> Hello {inputText}</p>
            
            </>
        )
       }
       function App() {
        const [inputText, setInputText] = React.useState("");
        return (
            <>
                <Something inputText={inputText} setInputText={setInputText} />
            </>
        )
       }
    const container = document.querySelector('.js-container');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
    </script>
   </body>
</html>
