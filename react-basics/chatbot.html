<!DOCTYPE html>
<html>
  <head>
    <title>Chatbot</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }

        .send-button {
            background-color: rgb(25, 135, 84);
            color: white;
            padding: 12px 20px;
            margin-left: 10px;
            border: none;
            cursor: pointer;
            border-radius: 10px;
            font-size: 15px;
        }

        .chat-input {
            padding: 12px 15px;
            border-radius: 10px;
            border: 1px solid black;
            font-size: 15px;
            flex-grow: 1;
        }

        .chat-input-container {
            display: flex;
        }

        .app-container {
            max-width: 600px;
            margin: 0 auto;
        }

        .chat-message-user {
            display: flex;
            justify-content: flex-end;
            align-items: start;

        }

        .chat-message-robot {
            display: flex;
            justify-content: flex-start;
            align-items: start;
        }

        .chat-message-text {
            background-color: rgb(238, 238, 238);
            padding: 15px 20px;
            border-radius: 10px;
            margin-right: 10px;
            margin-left: 10px;
            margin-bottom: 20px;
            max-width: 300px;
        }

        .chat-message-avatar {
            width: 45px;
        }
    </style>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
    <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
        function ChatInput({chatMessages, setChatMessages}) {
            const [inputText, setInputText] = React.useState("");


            function SaveInputText(event) {
                setInputText(event.target.value);

            }

            async function SendMessage() {
               const response = await Chatbot.getResponseAsync(inputText);
                setChatMessages([...chatMessages, {message: inputText, sender: "user", id: crypto.randomUUID()}, {message: response, sender: "robot", id: crypto.randomUUID()}]);
                setInputText("");
            }

            return (
                <div className="chat-input-container">
                    <input 
                        placeholder="Send a message to Chatbot" 
                        size="30" 
                        onChange={SaveInputText}
                        value={inputText}
                        onKeyDown={(event) => {
                            if (event.key === "Enter") {
                                SendMessage();
                            }
                        }}
                        className="chat-input"
                    />
                    <button 
                        className="send-button" 
                        onClick={SendMessage}>Send
                    </button>
                    
                </div>
            )
        }

        function ChatMessage({message, sender}) {
            return(
                <div className={sender === "robot" ? "chat-message-robot" : "chat-message-user"}>
                    {sender === 'robot' && <img src="robot.png" className="chat-message-avatar" />}
                    <div className="chat-message-text">
                        {message}
                    </div>
                    {sender === 'user' && <img src="user.png" className="chat-message-avatar" />}
                </div>
            );
        }

        function ChatMessages({chatMessages}) {
           const chatMessagesRef = React.useRef(null);
            React.useEffect(() => {
                const containerElem = chatMessagesRef.current;
                if (containerElem) {
                    containerElem.scrollTop = containerElem.scrollHeight;
                }
                
            }, [chatMessages]);
             return ( 
            <div 
                className="chat-messages-container"
                ref={chatMessagesRef}>
                {chatMessages.map((chatMessage) => {
                return (
                    <ChatMessage 
                        message={chatMessage.message} 
                        sender={chatMessage.sender} 
                        key={chatMessage.id}
                    />
                );
                
            })}
            </div>
             );
            
        }

        function App() { 
            const [chatMessages, setChatMessages] =  React.useState([
                {message: "Hello Chatbot", sender: "user", id: "id1"},
                {message: "Hello! How can I help you?", sender: "robot", id: "id2"},
                {message: "can you get me today's date?", sender: "user", id: "id3"},
                {message: "today is 19th of February", sender: "robot", id: "id4"}
            ]);
            return (
                <div className="app-container">
                    <ChatInput chatMessages={chatMessages} setChatMessages={setChatMessages} />
                    <ChatMessages chatMessages={chatMessages} />
                </div>
            );
        }

      const container = document.querySelector('.js-container');
      ReactDOM.createRoot(container).render(<App />);
    </script>
  </body>
</html>
